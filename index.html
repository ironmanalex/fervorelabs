<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fervore Labs — Software Studio</title>
    <meta name="description" content="Fervore Labs builds SaaS products, mobile apps, and custom software for industry.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 540px;
            padding: 2rem;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.3;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #999;
            margin-bottom: 1rem;
        }

        .services {
            margin-top: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid #333;
            border-radius: 100px;
            color: #888;
            letter-spacing: 0.03em;
        }

        .contact {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        .contact a {
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        .contact a:hover {
            border-color: #fff;
        }

        .location {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Fervore Labs</div>
        <h1>We build software that works.</h1>
        <p>SaaS products, mobile apps, and custom solutions for companies that need things done right.</p>

        <div class="services">
            <span class="tag">SaaS</span>
            <span class="tag">iOS Apps</span>
            <span class="tag">Web Applications</span>
            <span class="tag">CRM</span>
            <span class="tag">System Architecture</span>
            <span class="tag">Marketing</span>
        </div>

        <div class="contact">
            <a href="mailto:hello@fervorelabs.com">hello@fervorelabs.com</a>
            <div class="location">San Quirino, Italy</div>
        </div>
    </div>
</body>
</html>
